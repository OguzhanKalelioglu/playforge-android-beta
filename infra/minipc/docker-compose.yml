name: testers-minipc

x-emulator-base: &emulator-base
  image: budtmo/docker-android:emulator_11.0
  privileged: true
  devices:
    - /dev/kvm:/dev/kvm
  environment:
    - ANDROID_EMULATOR_DEVICE=Pixel_5
    - WEB_VNC=false
    - EMULATOR_PARAMS=-no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -accel auto -cores 2 -memory 1536
    - TZ=Europe/Istanbul
  shm_size: '2gb'
  mem_limit: 3gb
  volumes:
    - /tmp/.X11-unix:/tmp/.X11-unix
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "adb -s emulator-5554 shell getprop sys.boot_completed | grep -q 1 || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 12
    start_period: 180s
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "3"

services:
  emulator-01:
    <<: *emulator-base
    container_name: tc-emulator-01
    ports:
      - "5554:5554"
      - "5555:5555"
    volumes:
      - ./emulator-data/01:/root/.android

  emulator-02:
    <<: *emulator-base
    container_name: tc-emulator-02
    ports:
      - "5556:5554"
      - "5557:5555"
    volumes:
      - ./emulator-data/02:/root/.android

