user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Rate limit zone
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=10r/m;

    # ============== API (api.testerscomm.net) ==============
    server {
        listen 80;
        server_name api.testerscomm.net;

        # ACME challenge için (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name api.testerscomm.net;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Auth endpoint'leri için sıkı rate limit
        location ~ ^/api/v1/auth/(login|register|refresh) {
            limit_req zone=auth_rl burst=5 nodelay;
            proxy_pass http://api:8080;
            include /etc/nginx/proxy_params;
        }

        location / {
            limit_req zone=api_rl burst=20 nodelay;
            proxy_pass http://api:8080;
            include /etc/nginx/proxy_params;
        }
    }

    # ============== Web (testerscomm.net) ==============
    server {
        listen 80;
        server_name testerscomm.net www.testerscomm.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name testerscomm.net www.testerscomm.net;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://web:3000;
            include /etc/nginx/proxy_params;
        }
    }

    # ============== Asynqmon (queue.testerscomm.net) — sadece admin IP'leri ==============
    server {
        listen 443 ssl http2;
        server_name queue.testerscomm.net;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Basic auth + IP whitelist (production'da)
        # allow 1.2.3.4;
        # deny all;

        location / {
            proxy_pass http://asynqmon:8080;
            include /etc/nginx/proxy_params;
        }
    }
}
